{% assign _href = href | strip %}
{% if _href contains '://' or _href contains 'mailto:' or _href contains 'tel:' %}
  {% assign _qualified = true %}
{% else %}
  {% assign _qualified = false %}
{% endif %}
<a href="{% unless _qualified %}//{% endunless %}{{ _href }}" target="_blank" rel="noopener noreferrer" class="{{ class }}">
