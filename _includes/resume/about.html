<div class="container intro-container">
  <h3>{{ about.title | default: "About Me" }}</h3>
  <div class="row clearfix">
    {%- if about.profile_image -%}
      <div class="col-xs-12 col-sm-4 col-md-3 no-print">
        <span class="profile-img" style="background-image: url({{ about.about_profile_image }})"></span>
      </div>
    {%- endif -%}
    <div class="{{ 'col-xs-12 ' }}{%- if about.profile_image -%}col-sm-8 col-md-9 col-print-12{%- endif -%}">
      {{ about.content | strip | markdownify }}
    </div>
  </div>
</div>
